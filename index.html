<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사회계약 시뮬레이터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9f9f7;color:#1a1a1a;min-height:100vh}
.container{max-width:760px;margin:0 auto;padding:2rem 1.5rem}
.header{margin-bottom:2rem;padding-bottom:1.2rem;border-bottom:0.5px solid #e0ddd6}
.header h1{font-size:20px;font-weight:500;color:#1a1a1a;margin-bottom:4px}
.header p{font-size:13px;color:#888}
.step-indicator{display:flex;align-items:center;gap:8px;margin-bottom:1.5rem}
.step-dot{width:24px;height:24px;border-radius:50%;border:0.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#999;flex-shrink:0}
.step-dot.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.step-dot.done{background:#f0ede6;color:#666}
.step-line{flex:1;height:0.5px;background:#e0ddd6}
.step-label{font-size:11px;color:#999;white-space:nowrap}
.step-label.active{color:#1a1a1a;font-weight:500}
.ctx-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
@media(max-width:520px){.ctx-grid,.pool-grid,.time-grid{grid-template-columns:1fr}}
.ctx-card{border:0.5px solid #ccc;border-radius:12px;padding:1rem;cursor:pointer;transition:all .15s;text-align:left;background:#fff;width:100%}
.ctx-card:hover{border-color:#999;background:#f5f3ee}
.ctx-card.selected{border:1.5px solid #1a1a1a}
.ctx-name{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:4px}
.ctx-desc{font-size:11px;color:#999;line-height:1.5}
.next-btn{font-size:13px;padding:8px 20px;border-radius:20px;border:0.5px solid #1a1a1a;background:#1a1a1a;color:#fff;cursor:pointer}
.next-btn:disabled{opacity:.35;cursor:not-allowed}
.back-btn{font-size:12px;padding:6px 14px;border-radius:16px;border:0.5px solid #ccc;background:transparent;color:#666;cursor:pointer;margin-right:8px}
.sec-title{font-size:11px;font-weight:500;color:#999;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.var-pool-section{margin-bottom:1.2rem}
.pool-sec-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pool-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pool-sec-label{font-size:11px;font-weight:500;color:#888;letter-spacing:.05em;text-transform:uppercase}
.var-select-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.vsel-btn{border:0.5px solid #ccc;border-radius:8px;padding:8px 10px;cursor:pointer;text-align:left;background:#fff;transition:all .15s;width:100%}
.vsel-btn:hover{border-color:#999}
.vsel-btn.selected{border:1.5px solid #1a1a1a;background:#f5f3ee}
.vsel-name{font-size:12px;font-weight:500;color:#1a1a1a;margin-bottom:2px}
.vsel-desc{font-size:10px;color:#999;line-height:1.4}
.vsel-tag{font-size:10px;margin-top:4px;padding:1px 6px;border-radius:8px;display:inline-block}
.sel-count{font-size:12px;color:#666;margin-bottom:12px}
.sel-count span{font-weight:500;color:#1a1a1a}
.info-box{background:#eef4fb;border:0.5px solid #b8d4ee;border-radius:8px;padding:8px 12px;font-size:11px;color:#2a5a8a;margin-bottom:1rem}
.pool-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.pool-card{border:0.5px solid #e0ddd6;border-radius:12px;padding:12px 14px;background:#fff}
.pool-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.pool-name-txt{font-size:13px;font-weight:500}
.pool-nums{font-size:12px;color:#888}
.pool-track{height:5px;background:#f0ede6;border-radius:3px;overflow:hidden;margin-bottom:4px}
.pool-fill{height:100%;border-radius:3px;transition:width .3s}
.pool-note{font-size:10px;color:#999}
.tension-box{background:#fffbea;border:0.5px solid #e8d87a;border-radius:8px;padding:8px 12px;font-size:11px;color:#7a6010;margin-bottom:1rem;line-height:1.6}
.vsection{margin-bottom:1.2rem}
.vsec-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.vsec-label{font-size:11px;font-weight:500;color:#999;letter-spacing:.05em;text-transform:uppercase}
.add-var-btn{font-size:11px;padding:3px 9px;border-radius:12px;border:0.5px solid #ccc;background:transparent;color:#888;cursor:pointer;margin-left:auto}
.add-var-btn:hover{background:#f0ede6}
.vrow{border:0.5px solid #e0ddd6;border-radius:8px;padding:10px 14px;margin-bottom:8px;background:#fff}
.vrow-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.vname{font-size:13px;font-weight:500;color:#1a1a1a}
.vval{font-size:13px;font-weight:500;color:#1a1a1a}
.vdesc{font-size:11px;color:#999;margin-bottom:6px}
.vcontrols{display:flex;align-items:center;gap:8px}
.rm-btn{font-size:11px;padding:2px 7px;border-radius:10px;border:0.5px solid #e0ddd6;background:transparent;color:#bbb;cursor:pointer;flex-shrink:0}
.rm-btn:hover{color:#c0392b;border-color:#e0a0a0}
.ptags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.ptag{font-size:10px;padding:2px 7px;border-radius:10px;background:#f0ede6;color:#888}
.ptag.on{background:#fffbea;color:#7a6010;font-weight:500}
.rbadges{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.rb{font-size:10px;padding:1px 6px;border-radius:8px;border:0.5px solid #e0ddd6;color:#bbb}
.rb.up{background:#eaf5e8;color:#2e7d32;border-color:#a5d6a7}
.rb.dn{background:#fdecea;color:#c62828;border-color:#ef9a9a}
.add-panel{background:#f5f3ee;border:0.5px solid #ccc;border-radius:10px;padding:12px;margin-bottom:12px}
.add-panel-head{font-size:12px;font-weight:500;color:#1a1a1a;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.close-panel-btn{font-size:11px;padding:2px 8px;border-radius:10px;border:0.5px solid #ccc;background:transparent;color:#888;cursor:pointer}
.cand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px}
.cand-btn{font-size:11px;padding:6px 9px;border-radius:8px;border:0.5px solid #ccc;background:#fff;color:#888;cursor:pointer;text-align:left;line-height:1.4;width:100%}
.cand-btn:hover{border-color:#999;color:#1a1a1a}
.time-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.2rem}
.tc{border:0.5px solid #e0ddd6;border-radius:12px;padding:12px;background:#fff}
.tlabel{font-size:10px;font-weight:500;color:#999;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.mrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.mname{font-size:11px;color:#888;min-width:44px}
.mtrack{flex:1;margin:0 6px;height:4px;background:#f0ede6;border-radius:2px;overflow:hidden}
.mfill{height:100%;border-radius:2px;transition:width .4s}
.mnum{font-size:11px;font-weight:500;color:#1a1a1a;min-width:18px;text-align:right}
.diag{font-size:11px;color:#888;margin-top:8px;padding-top:8px;border-top:0.5px solid #e0ddd6;line-height:1.5}
.insights-section{margin-top:1.2rem}
.insight-card{border:0.5px solid #e0ddd6;border-radius:10px;padding:12px 14px;margin-bottom:8px;background:#fff}
.insight-q{font-size:11px;font-weight:500;color:#888;margin-bottom:5px}
.insight-a{font-size:12px;color:#1a1a1a;line-height:1.6}
.preset-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.pbtn{font-size:11px;padding:4px 11px;border-radius:16px;border:0.5px solid #ccc;background:transparent;color:#888;cursor:pointer}
.pbtn:hover,.pbtn.on{background:#f0ede6;color:#1a1a1a;border-color:#999}
.restart-btn{font-size:11px;padding:4px 11px;border-radius:16px;border:0.5px solid #ccc;background:transparent;color:#bbb;cursor:pointer;margin-left:auto}
.restart-btn:hover{color:#888}
input[type=range]{width:100%;accent-color:#1a1a1a;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>사회계약 시뮬레이터</h1>
    <p>지금 우리가 사회를 설계한다면 — 변수를 조정하고 30년 뒤 사회를 확인하세요</p>
  </div>
  <div id="app"></div>
</div>
<script>
var POOLS={finance:{name:'재원',color:'#185FA5'},admin:{name:'행정력',color:'#0F6E56'},political:{name:'정치자본',color:'#534AB7'}};
var COMMON_VARS=[
  {id:'defense',name:'국방',desc:'대외 안보·군사력 수준',pool:'finance',
   phil:[{n:'홉스',r:[50,100],note:'주권자의 핵심 의무'},{n:'로크',r:[20,60],note:'자연권 보호를 위한 최소 방어'}],
   ripple:[{id:'welfare',dir:'dn',label:'복지 재원'}]},
  {id:'police',name:'치안',desc:'내부 질서·범죄 통제 수준',pool:'admin',
   phil:[{n:'홉스',r:[55,100],note:'리바이어던의 핵심 기능'},{n:'로크',r:[25,60],note:'생명·재산 보호'}],
   ripple:[{id:'freedom',dir:'dn',label:'개인 자유'}]},
  {id:'welfare',name:'복지',desc:'저소득층·취약계층 지원, 사회 안전망',pool:'finance',
   phil:[{n:'루소',r:[55,100],note:'불평등은 사회계약의 적'},{n:'롤스',r:[50,90],note:'최소 수혜자를 보호하라'},{n:'노직',r:[0,25],note:'강제 재분배는 권리 침해'}],
   ripple:[{id:'equality',dir:'up',label:'평등'}]},
  {id:'publicinvest',name:'사회기반투자',desc:'도로·교통·에너지·디지털 공공 기반시설',pool:'finance',
   phil:[{n:'케인스',r:[50,100],note:'공공투자가 장기 성장을 이끈다'},{n:'하이에크',r:[0,35],note:'시장이 더 효율적으로 배분한다'}],
   ripple:[{id:'prosperity',dir:'up',label:'장기 번영'},{id:'finance',dir:'dn',label:'재원 소모'}]},
  {id:'democracy',name:'민주 참여',desc:'시민의 직·간접 의사결정 정도',pool:'political',
   phil:[{n:'루소',r:[65,100],note:'일반의지는 직접 참여에서만'},{n:'매디슨',r:[35,65],note:'대의제로 다수의 횡포를 막는다'},{n:'슘페터',r:[15,45],note:'민주주의는 지도자 선출 절차'}],
   ripple:[{id:'political',dir:'up',label:'정치자본'}]},
  {id:'equality',name:'평등 추구',desc:'기회와 결과의 균등 수준',pool:'political',
   phil:[{n:'롤스',r:[60,100],note:'차등 원칙: 불평등은 최소 수혜자에게 이익일 때만'},{n:'노직',r:[0,25],note:'결과 평등은 자유의 적'},{n:'마르크스',r:[75,100],note:'필요에 따라 분배하라'}],
   ripple:[{id:'welfare',dir:'up',label:'복지'}]},
  {id:'freedom',name:'개인 자유',desc:'표현·이동·선택·양심의 자유 범위',pool:'political',
   phil:[{n:'밀',r:[65,100],note:'타인을 해치지 않는 한 모든 자유'},{n:'로크',r:[45,80],note:'자연권으로서의 자유'},{n:'홉스',r:[10,40],note:'주권이 침묵하는 곳에만 자유가 있다'}],
   ripple:[{id:'police',dir:'dn',label:'통제 가능성'}]},
  {id:'ruleoflaw',name:'법치주의',desc:'규칙의 엄격성과 예외 없는 적용',pool:'admin',
   phil:[{n:'로크',r:[55,100],note:'법 앞의 평등'},{n:'몽테스키외',r:[50,90],note:'삼권분립으로 법치를 보장'}],
   ripple:[{id:'police',dir:'up',label:'치안 효과'}]},
  {id:'market',name:'시장 자유도',desc:'국가 규제 수준 대 자유경쟁',pool:'admin',
   phil:[{n:'스미스',r:[60,100],note:'보이지 않는 손이 최적 배분'},{n:'케인스',r:[20,50],note:'시장 실패는 정부가 교정해야'},{n:'하이에크',r:[65,100],note:'자생적 질서가 계획보다 우월'}],
   ripple:[{id:'equality',dir:'dn',label:'평등 추구'}]},
  {id:'tax',name:'세금 수준',desc:'국가 재원 조달 정도',pool:'finance',
   phil:[{n:'롤스',r:[55,100],note:'공정한 재분배를 위한 과세'},{n:'노직',r:[0,30],note:'세금은 강제 노동과 다름없다'}],
   ripple:[{id:'finance',dir:'up',label:'재원 증가'}]},
  {id:'property',name:'소유권 보호',desc:'사적 재산의 불가침성 수준',pool:'admin',
   phil:[{n:'로크',r:[60,100],note:'노동에서 소유권이 발생한다'},{n:'루소',r:[0,30],note:'사유재산이 불평등의 기원'}],
   ripple:[{id:'equality',dir:'dn',label:'평등 추구'}]},
  {id:'multiculture',name:'다문화·이주',desc:'이주민 수용과 문화 다양성 허용 수준',pool:'political',
   phil:[{n:'롤스',r:[50,90],note:'합당한 다원주의'},{n:'공동체주의',r:[0,40],note:'공동체 정체성 보호가 우선'}],
   ripple:[{id:'cohesion',dir:'dn',label:'단기 통합'}]},
  {id:'digital',name:'디지털 주권',desc:'데이터·플랫폼·AI에 대한 국가 통제 수준',pool:'admin',
   phil:[{n:'하버마스',r:[55,100],note:'공론장의 민주적 통제'},{n:'자유주의',r:[0,35],note:'플랫폼은 민간 영역'}],
   ripple:[{id:'freedom',dir:'dn',label:'정보 자유'}]},
  {id:'infoecology',name:'정보생태계 건전성',desc:'시민이 공유하는 사실 기반의 신뢰도·다양성',pool:'political',
   phil:[{n:'하버마스',r:[55,100],note:'공론장은 공유된 사실 기반 위에 선다'},{n:'롤스',r:[45,85],note:'공적 이성은 공통 정보를 전제한다'},{n:'밀',r:[50,90],note:'사상의 자유 시장은 오류를 교정한다'}],
   ripple:[{id:'democracy',dir:'up',label:'민주 참여 효과'},{id:'legitimacy',dir:'up',label:'정당성'}]}
];
var KOREA_VARS=[
  {id:'generation',name:'세대 간 형평성',desc:'미래 세대에 대한 현재 세대의 책임 수준',pool:'political',
   phil:[{n:'롤스',r:[55,100],note:'저축 원칙: 미래 세대도 계약 당사자'},{n:'공리주의',r:[40,80],note:'전체 세대의 총 효용을 최대화'}],
   ripple:[{id:'welfare',dir:'dn',label:'현세대 복지'},{id:'publicinvest',dir:'up',label:'장기 투자'}]},
  {id:'population',name:'인구 구조 대응',desc:'저출생·고령화에 대한 국가 개입 수준',pool:'finance',
   phil:[{n:'케인스',r:[50,100],note:'국가가 적극 개입해야 한다'},{n:'자유주의',r:[0,35],note:'출산은 개인 선택의 문제'}],
   ripple:[{id:'welfare',dir:'up',label:'복지 수요'},{id:'finance',dir:'dn',label:'재원 압박'}]},
  {id:'regional',name:'지역 균형',desc:'수도권 집중 완화와 지방 균형 투자',pool:'finance',
   phil:[{n:'롤스',r:[55,100],note:'공간적 불평등도 교정 대상'},{n:'효율주의',r:[0,35],note:'집적 효과가 분산보다 크다'}],
   ripple:[{id:'publicinvest',dir:'up',label:'사회기반투자'},{id:'finance',dir:'dn',label:'재원 소모'}]}
];
var PRESETS=[
  {name:'홉스형',vars:['defense','police','welfare','democracy','equality','publicinvest'],vals:{defense:75,police:80,welfare:25,democracy:20,equality:25,publicinvest:35,tax:40}},
  {name:'로크형',vars:['defense','police','welfare','democracy','equality','publicinvest','freedom','property','ruleoflaw'],vals:{defense:50,police:50,welfare:30,democracy:50,equality:30,publicinvest:40,freedom:65,property:80,ruleoflaw:70,tax:35}},
  {name:'루소형',vars:['defense','police','welfare','democracy','equality','publicinvest','multiculture','tax','infoecology'],vals:{defense:30,police:30,welfare:75,democracy:80,equality:80,publicinvest:60,multiculture:65,tax:65,infoecology:70}},
  {name:'북유럽형',vars:['defense','police','welfare','democracy','equality','publicinvest','freedom','tax','ruleoflaw','infoecology'],vals:{defense:45,police:50,welfare:80,democracy:75,equality:78,publicinvest:75,freedom:70,tax:75,ruleoflaw:75,infoecology:78}},
  {name:'싱가포르형',vars:['defense','police','welfare','democracy','equality','publicinvest','market','property','ruleoflaw','digital'],vals:{defense:80,police:85,welfare:55,democracy:25,equality:40,publicinvest:70,market:70,property:75,ruleoflaw:80,digital:70,tax:45}}
];
var CONTEXTS=[
  {id:'universal',name:'보편 사회',desc:'시대·장소를 특정하지 않고 사회 원칙을 설계합니다'},
  {id:'korea',name:'지금 한국',desc:'오늘날 한국의 현실적 맥락에서 설계합니다'},
  {id:'custom',name:'직접 구성',desc:'변수를 자유롭게 골라 나만의 사회를 설계합니다'}
];
var state={step:1,ctx:null,selectedVars:[],vals:{},activePreset:null,openPanel:null};
COMMON_VARS.concat(KOREA_VARS).forEach(function(v){state.vals[v.id]=40;});
function allVars(){return COMMON_VARS.concat(KOREA_VARS);}
function findVar(id){return allVars().find(function(v){return v.id===id;});}
function availableVars(){return state.ctx==='korea'?COMMON_VARS.concat(KOREA_VARS):COMMON_VARS;}
function poolMax(pid){var b=200;if(pid==='finance')b+=Math.round((state.vals['tax']||0)*.6);return b;}
function poolUsed(pid){var s=0;state.selectedVars.forEach(function(id){var v=findVar(id);if(v&&v.pool===pid)s+=(state.vals[id]||0);});return s;}
function barColor(v){return v>=63?'#3B6D11':v>=38?'#BA7517':'#A32D2D';}
function vv(id){return state.vals[id]||0;}
function computeOut(yr){
  var finR=Math.min(1.1,poolMax('finance')/Math.max(1,poolUsed('finance')));
  var decay=yr===3?1:yr===10?.93:.82;
  var lb=yr===30?.12:yr===10?.05:0;
  var kor=state.ctx==='korea';

  var coh=Math.min(97,Math.max(5,Math.round((vv('welfare')*.2+vv('equality')*.2+vv('democracy')*.15+vv('multiculture')*.15+vv('publicinvest')*.1+vv('infoecology')*.2+(kor?(vv('regional')*.05+vv('generation')*.05):.1))*(1+lb*.8)*decay)));
  var leg=Math.min(97,Math.max(5,Math.round((vv('democracy')*.3+vv('freedom')*.15+vv('equality')*.2+vv('ruleoflaw')*.15+vv('infoecology')*.2)*(yr===3?.88:yr===10?1:1.1)*(1+infoBonus))));
  var fre=Math.min(97,Math.max(5,Math.round((vv('freedom')*.45+(100-vv('police'))*.25+vv('democracy')*.15+(100-vv('digital'))*.15)*decay)));

  return{sec:sec,pros:pros,coh:coh,leg:leg,fre:fre,sus:sus};
}
function getDiag(out,yr){
  var label=yr===3?'3년':yr===10?'10년':'30년';
  var names={sec:'안전도',pros:'번영도',coh:'사회통합',leg:'정당성',fre:'체감자유',sus:'지속성'};

  if(out.coh>72&&out.leg>68)return label+': 통합·정당성 안정적';

  var fu=poolUsed('finance'),fm=poolMax('finance'),wr=Math.max(0,fm-fu);

    {q:'이 계약에 동의하지 않을 집단은?',a:dis.join(', ')+'이 불이익을 받을 가능성이 높습니다. '+(dis.length>2?'여러 집단이 동시에 불만을 가질 경우 정치적 연대와 저항이 발생할 수 있습니다.':'이 집단의 요구를 어떻게 수용할지가 계약의 안정성을 결정합니다.')},

  ];

    card.querySelector('.pool-nums').textContent=u+'/'+m;
    card.querySelector('.pool-fill').style.width=pct+'%';
    card.querySelector('.pool-fill').style.background=over?'#A32D2D':p.color;
    card.querySelector('.pool-note').textContent=over?'초과':'잔여 '+(m-u);
  });
}
document.addEventListener('input',function(e){
  if(e.target.dataset.action!=='slide')return;
  var id=e.target.dataset.id,val=parseInt(e.target.value);
  state.vals[id]=val;state.activePreset=null;
  var ve=document.getElementById('val-'+id);if(ve)ve.textContent=val;
  var v=findVar(id);
  if(v){var pe=document.getElementById('ptags-'+id);if(pe)pe.innerHTML=v.phil.map(function(p){var on=val>=p.r[0]&&val<=p.r[1];return '<span class="ptag'+(on?' on':'')+'" title="'+p.note+'">'+p.n+'</span>';}).join('');}
  updateResults();
});
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');if(!el)return;
  var action=el.dataset.action,val=el.dataset.val;
  if(action==='ctx'){state.ctx=val;renderApp();}
  else if(action==='step1'){state.step=1;renderApp();}
  else if(action==='step2'){if(state.ctx){state.step=2;renderApp();}}
  else if(action==='step3'){if(state.selectedVars.length>=4){state.step=3;renderApp();}}
  else if(action==='togglevar'){
    var idx=state.selectedVars.indexOf(val);
    if(idx===-1){if(state.selectedVars.length<10)state.selectedVars.push(val);}
    else{if(state.selectedVars.length>1)state.selectedVars.splice(idx,1);}
    renderApp();
  }
  else if(action==='openpanel'){state.openPanel=val;renderApp();}
  else if(action==='closepanel'){state.openPanel=null;renderApp();}
  else if(action==='addvar'){state.selectedVars.push(val);state.openPanel=null;renderApp();}
  else if(action==='removevar'){state.selectedVars=state.selectedVars.filter(function(x){return x!==val;});renderApp();}
  else if(action==='preset'){
    var p=PRESETS.find(function(x){return x.name===val;});if(!p)return;
    state.activePreset=val;state.selectedVars=p.vars.slice();
    Object.keys(p.vals).forEach(function(id){state.vals[id]=p.vals[id];});
    state.step=3;renderApp();
  }
});
renderApp();
</script>
</body>
</html>
